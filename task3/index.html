<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drag and Drop Image Uploader</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Image Upload</h2>

<div id="drop-area">
    <p>Drag & Drop Image Here</p>
    <span>or</span>
    <input type="file" id="fileElem" accept="image/*">
    <label for="fileElem" class="btn">Choose Image</label>
</div>

<div id="error"></div>

<div class="progress-container">
    <div id="progress-bar"></div>
</div>

<div id="preview"></div>

</div>

<script src="script.js"></script>
</body>
</html>
